<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Subhaan Syed</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet" />
  <!-- Quill.js 1.3.7 -->
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet" />
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #F7F2EA;
      --text:    #1A1A1A;
      --sec:     #252220;
      --muted:   #6B6760;
      --gold:    #C9A050;
      --border:  #E8E0D5;
      --font:    'Cormorant Garamond', Georgia, serif;
    }

    html { font-size: 18px; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 48px 40px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 400;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 32px;
    }

    /* ── Login ── */
    #login-screen {
      max-width: 420px;
    }

    #login-screen label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    #pat-input {
      width: 100%;
      padding: 10px 14px;
      font-family: monospace;
      font-size: 0.85rem;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 16px;
      color: var(--text);
    }

    #login-error {
      font-size: 0.8rem;
      color: #c0392b;
      margin-bottom: 12px;
      display: none;
    }

    /* ── Buttons ── */
    .btn {
      font-family: var(--font);
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 9px 20px;
      border: 1px solid var(--text);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      border-radius: 3px;
    }

    .btn:hover { background: var(--text); color: var(--bg); }

    .btn-gold {
      border-color: var(--gold);
      color: var(--gold);
    }

    .btn-gold:hover { background: var(--gold); color: var(--bg); }

    .btn-sm {
      font-size: 0.68rem;
      padding: 6px 14px;
    }

    .btn-danger {
      border-color: #c0392b;
      color: #c0392b;
    }

    .btn-danger:hover { background: #c0392b; color: #fff; }

    /* ── Admin panel ── */
    #admin-panel { display: none; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 28px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }

    .tab {
      font-family: var(--font);
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 20px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.2s;
      margin-bottom: -1px;
    }

    .tab:hover { color: var(--text); }

    .tab.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    /* ── Tab panels ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Form elements ── */
    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      padding: 10px 14px;
      font-family: var(--font);
      font-size: 0.95rem;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      resize: vertical;
    }

    .field textarea { min-height: 80px; line-height: 1.6; }

    .field input:focus,
    .field textarea:focus {
      outline: none;
      border-color: var(--gold);
    }

    hr.sep {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    /* ── Status message ── */
    .status {
      font-size: 0.8rem;
      padding: 10px 14px;
      border-radius: 4px;
      margin-bottom: 16px;
      display: none;
    }

    .status.ok { background: #e8f5e9; color: #2e7d32; display: block; }
    .status.err { background: #fdecea; color: #c62828; display: block; }

    /* ── Thoughts list ── */
    .thought-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }

    .thought-row:first-child { border-top: 1px solid var(--border); }

    .thought-row-text {
      flex: 1;
      line-height: 1.55;
      font-weight: 300;
    }

    .thought-row-date {
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Reading list ── */
    .reading-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }

    .reading-row:first-child { border-top: 1px solid var(--border); }

    .reading-row-info { flex: 1; }
    .reading-row-title { font-weight: 400; }
    .reading-row-commentary { font-size: 0.78rem; color: var(--sec); font-style: italic; margin-top: 2px; }

    /* ── Blog post list ── */
    .post-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      font-size: 1rem;
    }

    .post-row:first-child { border-top: 1px solid var(--border); }

    /* ── Video list ── */
    .video-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }

    .video-row:first-child { border-top: 1px solid var(--border); }

    /* ── Quill editor ── */
    #blog-editor-wrap { max-width: 720px; }

    .ql-container { font-family: var(--font); font-size: 1rem; min-height: 320px; }
    .ql-toolbar { border-color: var(--border) !important; background: #fff; }
    .ql-container { border-color: var(--border) !important; background: #fff; }

    .form-row {
      display: flex;
      gap: 16px;
    }

    .form-row .field { flex: 1; }

    .section-heading {
      font-size: 0.68rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }
  </style>
</head>
<body>

<!-- ── Login ── -->
<div id="login-screen">
  <h1>Admin</h1>
  <p class="subtitle">Subhaan Syed — Site Management</p>
  <label for="pat-input">GitHub Personal Access Token</label>
  <input type="password" id="pat-input" placeholder="ghp_..." autocomplete="off" />
  <div id="login-error">Invalid token or insufficient permissions.</div>
  <button class="btn btn-gold" onclick="login()">Sign In</button>
</div>

<!-- ── Admin panel ── -->
<div id="admin-panel">
  <div class="top-bar">
    <div>
      <h1>Admin</h1>
      <p class="subtitle">Subhaan Syed — Site Management</p>
    </div>
    <button class="btn btn-sm" onclick="logout()">Sign Out</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('thoughts')">Thoughts</button>
    <button class="tab" onclick="switchTab('reading')">Reading</button>
    <button class="tab" onclick="switchTab('blog')">Blog</button>
    <button class="tab" onclick="switchTab('videos')">Videos</button>
    <button class="tab" onclick="switchTab('currently')">Currently</button>
  </div>

  <!-- ── Thoughts ── -->
  <div id="panel-thoughts" class="panel active">
    <div id="status-thoughts" class="status"></div>
    <p class="section-heading">New Thought</p>
    <div class="field">
      <label>Text</label>
      <textarea id="thought-text" placeholder="What's on your mind..."></textarea>
    </div>
    <button class="btn btn-gold" onclick="addThought()">Post Thought</button>
    <hr class="sep" />
    <p class="section-heading">All Thoughts</p>
    <div id="thoughts-list"></div>
  </div>

  <!-- ── Reading ── -->
  <div id="panel-reading" class="panel">
    <div id="status-reading" class="status"></div>
    <p class="section-heading">Add Link</p>
    <div class="form-row">
      <div class="field">
        <label>Title</label>
        <input type="text" id="reading-title" placeholder="Article or paper title" />
      </div>
      <div class="field">
        <label>URL</label>
        <input type="url" id="reading-url" placeholder="https://..." />
      </div>
    </div>
    <div class="field">
      <label>Commentary (optional)</label>
      <textarea id="reading-commentary" placeholder="Brief note on why it's interesting..." style="min-height:60px;"></textarea>
    </div>
    <div style="display:flex;gap:12px;align-items:center;">
      <button class="btn btn-gold" id="reading-submit-btn" onclick="addReading()">Add Link</button>
      <button class="btn btn-sm" id="reading-cancel-btn" onclick="cancelReadingEdit()" style="display:none;">Cancel Edit</button>
    </div>
    <hr class="sep" />
    <p class="section-heading">All Links</p>
    <div id="reading-list"></div>
  </div>

  <!-- ── Blog ── -->
  <div id="panel-blog" class="panel">
    <div id="status-blog" class="status"></div>

    <!-- Post list -->
    <div id="blog-list-view">
      <p class="section-heading">New Post</p>
      <div class="form-row">
        <div class="field">
          <label>Title</label>
          <input type="text" id="blog-title" placeholder="Post title" />
        </div>
        <div class="field">
          <label>Subtitle (optional)</label>
          <input type="text" id="blog-subtitle" placeholder="One-line description" />
        </div>
      </div>
      <div class="field">
        <label>Slug (URL path, e.g. my-post-title)</label>
        <input type="text" id="blog-slug" placeholder="my-post-title" />
      </div>
      <p class="section-heading" style="margin-top:20px;">Content — paste images with Ctrl+V</p>
      <div id="blog-editor-wrap">
        <div id="quill-editor"></div>
      </div>
      <div style="margin-top:16px;display:flex;gap:12px;align-items:center;">
        <button class="btn btn-gold" id="blog-submit-btn" onclick="publishPost()">Publish Post</button>
        <button class="btn btn-sm" id="blog-cancel-btn" onclick="cancelBlogEdit()" style="display:none;">Cancel Edit</button>
      </div>
      <hr class="sep" />
      <p class="section-heading">Published Posts</p>
      <div id="blog-list"></div>
    </div>
  </div>

  <!-- ── Videos ── -->
  <div id="panel-videos" class="panel">
    <div id="status-videos" class="status"></div>
    <p class="section-heading">Add Video</p>
    <div class="form-row">
      <div class="field">
        <label>YouTube URL or Video ID</label>
        <input type="text" id="video-id" placeholder="https://youtube.com/watch?v=... or dQw4w9WgXcQ" />
      </div>
      <div class="field">
        <label>Title</label>
        <input type="text" id="video-title" placeholder="Video title" />
      </div>
    </div>
    <button class="btn btn-gold" onclick="addVideo()">Add Video</button>
    <hr class="sep" />
    <p class="section-heading">All Videos</p>
    <div id="videos-list"></div>
  </div>

  <!-- ── Currently ── -->
  <div id="panel-currently" class="panel">
    <div id="status-currently" class="status"></div>
    <p class="section-heading">Update Currently</p>
    <div class="field">
      <label>Status line</label>
      <input type="text" id="currently-text" placeholder="finishing the semester." />
    </div>
    <div class="field">
      <label>Reading (optional)</label>
      <input type="text" id="currently-reading" placeholder="Book or article name" />
    </div>
    <div class="field">
      <label>Thinking about (optional)</label>
      <input type="text" id="currently-thinking" placeholder="Topic or idea" />
    </div>
    <button class="btn btn-gold" onclick="saveCurrently()">Save</button>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────
const REPO_OWNER = 'Subhaan50'
const REPO_NAME  = 'subhaan-portfolio'
const BRANCH     = 'main'

// ── Auth ────────────────────────────────────────────────────
function getToken() { return localStorage.getItem('admin_pat') || '' }

async function login() {
  const token = document.getElementById('pat-input').value.trim()
  if (!token) return
  // Verify token works by fetching repo info
  const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`, {
    headers: { Authorization: `Bearer ${token}`, 'X-GitHub-Api-Version': '2022-11-28' }
  })
  if (!res.ok) {
    document.getElementById('login-error').style.display = 'block'
    return
  }
  localStorage.setItem('admin_pat', token)
  document.getElementById('login-error').style.display = 'none'
  showPanel()
}

function logout() {
  localStorage.removeItem('admin_pat')
  document.getElementById('admin-panel').style.display = 'none'
  document.getElementById('login-screen').style.display = 'block'
  document.getElementById('pat-input').value = ''
}

function showPanel() {
  document.getElementById('login-screen').style.display = 'none'
  document.getElementById('admin-panel').style.display = 'block'
  loadAll()
}

// ── GitHub API helpers ──────────────────────────────────────
async function ghGet(path) {
  const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}?ref=${BRANCH}`, {
    headers: { Authorization: `Bearer ${getToken()}`, 'X-GitHub-Api-Version': '2022-11-28' }
  })
  if (!res.ok) throw new Error(`GET ${path} failed: ${res.status}`)
  return res.json()
}

async function ghPut(path, content, message, sha) {
  const body = {
    message,
    content: btoa(unescape(encodeURIComponent(content))),
    branch: BRANCH,
  }
  if (sha) body.sha = sha
  const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
    method: 'PUT',
    headers: {
      Authorization: `Bearer ${getToken()}`,
      'Content-Type': 'application/json',
      'X-GitHub-Api-Version': '2022-11-28'
    },
    body: JSON.stringify(body)
  })
  if (!res.ok) {
    const err = await res.json()
    throw new Error(err.message || `PUT ${path} failed`)
  }
  return res.json()
}

// For binary files (images) — content is already base64, skip re-encoding
async function ghPutBase64(path, base64, message) {
  let sha
  try { const f = await ghGet(path); sha = f.sha } catch {}
  const body = { message, content: base64, branch: BRANCH }
  if (sha) body.sha = sha
  const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
    method: 'PUT',
    headers: {
      Authorization: `Bearer ${getToken()}`,
      'Content-Type': 'application/json',
      'X-GitHub-Api-Version': '2022-11-28'
    },
    body: JSON.stringify(body)
  })
  if (!res.ok) { const err = await res.json(); throw new Error(err.message || `PUT ${path} failed`) }
  return res.json()
}

async function readJson(path) {
  const file = await ghGet(path)
  return { data: JSON.parse(decodeURIComponent(escape(atob(file.content)))), sha: file.sha }
}

async function writeJson(path, data, message) {
  let sha
  try { const f = await ghGet(path); sha = f.sha } catch {}
  return ghPut(path, JSON.stringify(data, null, 2) + '\n', message, sha)
}

// ── Status helpers ──────────────────────────────────────────
function setStatus(tab, msg, isErr) {
  const el = document.getElementById(`status-${tab}`)
  el.textContent = msg
  el.className = 'status ' + (isErr ? 'err' : 'ok')
  setTimeout(() => { el.className = 'status' }, 4000)
}

// ── Tabs ────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'))
  event.target.classList.add('active')
  document.getElementById(`panel-${name}`).classList.add('active')
  // Init Quill lazily — only when Blog tab is visible so Quill can measure the element
  if (name === 'blog') initQuill()
}

// ── Load all ────────────────────────────────────────────────
function loadAll() {
  loadThoughts()
  loadReading()
  loadBlogData()  // loads post list only — Quill inits lazily on tab click
  loadVideos()
  loadCurrently()
}

// ── Thoughts ────────────────────────────────────────────────
let thoughtsData = [], thoughtsSha = ''

async function loadThoughts() {
  try {
    const { data, sha } = await readJson('public/data/thoughts.json')
    thoughtsData = data; thoughtsSha = sha
    renderThoughtsList()
  } catch(e) { console.error(e) }
}

function renderThoughtsList() {
  const el = document.getElementById('thoughts-list')
  if (!thoughtsData.length) { el.innerHTML = '<p style="color:var(--muted);font-size:0.85rem;">No thoughts yet.</p>'; return }
  el.innerHTML = thoughtsData.slice().reverse().map((t, i) => {
    const idx = thoughtsData.length - 1 - i
    const dt = new Date(t.datetime)
    const dateStr = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
    const timeStr = dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
    return `<div class="thought-row">
      <span class="thought-row-text">${escHtml(t.text)}</span>
      <span class="thought-row-date">${dateStr} · ${timeStr}</span>
      <button class="btn btn-sm" onclick="archiveThought(${idx})">Archive</button>
      <button class="btn btn-sm btn-danger" onclick="deleteThought(${idx})">Delete</button>
    </div>`
  }).join('')
}

async function addThought() {
  const text = document.getElementById('thought-text').value.trim()
  if (!text) return
  thoughtsData.push({ text, datetime: new Date().toISOString() })
  try {
    await writeJson('public/data/thoughts.json', thoughtsData, 'add thought')
    document.getElementById('thought-text').value = ''
    setStatus('thoughts', 'Thought posted!')
    renderThoughtsList()
  } catch(e) { setStatus('thoughts', e.message, true); thoughtsData.pop() }
}

async function archiveThought(idx) {
  const t = thoughtsData[idx]
  if (!confirm('Archive this thought?')) return
  try {
    await archiveEntry(t.text, t.datetime.slice(0, 10))
    thoughtsData.splice(idx, 1)
    await writeJson('public/data/thoughts.json', thoughtsData, 'archive thought')
    setStatus('thoughts', 'Archived.')
    renderThoughtsList()
  } catch(e) { setStatus('thoughts', e.message, true) }
}

async function deleteThought(idx) {
  if (!confirm('Permanently delete this thought?')) return
  thoughtsData.splice(idx, 1)
  try {
    await writeJson('public/data/thoughts.json', thoughtsData, 'delete thought')
    setStatus('thoughts', 'Deleted.')
    renderThoughtsList()
  } catch(e) { setStatus('thoughts', e.message, true) }
}

// ── Reading ──────────────────────────────────────────────────
let readingData = []
let editingReadingIdx = null

async function loadReading() {
  try {
    const { data } = await readJson('public/data/reading.json')
    readingData = data
    renderReadingList()
  } catch(e) { console.error(e) }
}

function renderReadingList() {
  const el = document.getElementById('reading-list')
  if (!readingData.length) { el.innerHTML = '<p style="color:var(--muted);font-size:0.85rem;">No links yet.</p>'; return }
  el.innerHTML = readingData.slice().reverse().map((r, i) => {
    const idx = readingData.length - 1 - i
    return `<div class="reading-row">
      <div class="reading-row-info">
        <div class="reading-row-title"><a href="${escHtml(r.url)}" target="_blank" rel="noopener noreferrer">${escHtml(r.title)}</a></div>
        ${r.commentary ? `<div class="reading-row-commentary">${escHtml(r.commentary)}</div>` : ''}
      </div>
      <span style="font-size:0.72rem;color:var(--muted);white-space:nowrap;">${r.date}</span>
      <button class="btn btn-sm" onclick="editReading(${idx})">Edit</button>
      <button class="btn btn-sm" onclick="archiveReading(${idx})">Archive</button>
      <button class="btn btn-sm btn-danger" onclick="deleteReading(${idx})">Delete</button>
    </div>`
  }).join('')
}

function editReading(idx) {
  const r = readingData[idx]
  document.getElementById('reading-title').value = r.title
  document.getElementById('reading-url').value = r.url
  document.getElementById('reading-commentary').value = r.commentary || ''
  editingReadingIdx = idx
  document.getElementById('reading-submit-btn').textContent = 'Update Link'
  document.getElementById('reading-cancel-btn').style.display = 'inline-block'
  document.getElementById('reading-title').focus()
}

function cancelReadingEdit() {
  editingReadingIdx = null
  document.getElementById('reading-title').value = ''
  document.getElementById('reading-url').value = ''
  document.getElementById('reading-commentary').value = ''
  document.getElementById('reading-submit-btn').textContent = 'Add Link'
  document.getElementById('reading-cancel-btn').style.display = 'none'
}

async function addReading() {
  const title = document.getElementById('reading-title').value.trim()
  const url   = document.getElementById('reading-url').value.trim()
  const commentary = document.getElementById('reading-commentary').value.trim()
  if (!title || !url) return
  const today = new Date().toISOString().slice(0, 10)

  if (editingReadingIdx !== null) {
    const orig = readingData[editingReadingIdx]
    readingData[editingReadingIdx] = { title, url, commentary, date: orig.date }
    try {
      await writeJson('public/data/reading.json', readingData, 'update reading link')
      setStatus('reading', 'Updated!')
      cancelReadingEdit()
      renderReadingList()
    } catch(e) { setStatus('reading', e.message, true) }
    return
  }

let postsData = []
let quill
let editingPostIdx = null

function initQuill() {
  if (quill) return

  quill = new Quill('#quill-editor', {
    theme: 'snow',
    modules: {
      toolbar: [
        [{ header: [1, 2, 3, false] }],
        ['bold', 'italic', 'underline', 'strike'],
        [{ align: [] }],
        ['blockquote', 'code-block'],
        [{ list: 'ordered' }, { list: 'bullet' }],
        ['link', 'image'],
        ['clean']
      ]
    }
  })

  // Ctrl+V image paste — uploads to GitHub and inserts URL
  quill.root.addEventListener('paste', async (e) => {
    const items = e.clipboardData && e.clipboardData.items
    if (!items) return
    for (const item of items) {
      if (!item.type.startsWith('image/')) continue
      e.preventDefault()
      const file = item.getAsFile()
      const ext = file.type.split('/')[1].replace('jpeg', 'jpg')
      const filename = `images/${Date.now()}.${ext}`
      const reader = new FileReader()
      reader.onload = async (ev) => {
        const base64 = ev.target.result.split(',')[1]
        setStatus('blog', 'Uploading image...')
        try {
          await ghPutBase64(`public/${filename}`, base64, `upload image`)
          const url = `/${filename}`
          const range = quill.getSelection(true)
          quill.insertEmbed(range.index, 'image', url)
          quill.setSelection(range.index + 1)
          setStatus('blog', 'Image uploaded!')
        } catch(err) { setStatus('blog', 'Image upload failed: ' + err.message, true) }
      }
      reader.readAsDataURL(file)
      break
    }
  })
}

async function loadBlogData() {
  try {
    const { data } = await readJson('public/data/posts.json')
    postsData = data
    renderBlogList()
  } catch(e) {
    setStatus('blog', 'Error loading posts: ' + e.message, true)
    console.error(e)
  }
}

function renderBlogList() {
  const el = document.getElementById('blog-list')
  if (!postsData.length) { el.innerHTML = '<p style="color:var(--muted);font-size:0.85rem;">No posts yet.</p>'; return }
  el.innerHTML = postsData.slice().sort((a, b) => new Date(b.date) - new Date(a.date)).map((p, i) => {
    const idx = postsData.findIndex(x => x.url === p.url)
    return `<div class="post-row">
      <span>${escHtml(p.title)}</span>
      <span style="font-size:0.72rem;color:var(--muted);">${p.date}</span>
      <a href="/${p.url}" target="_blank" class="btn btn-sm">View</a>
      <button class="btn btn-sm" onclick="editPost(${idx})">Edit</button>
      <button class="btn btn-sm" onclick="archivePost(${idx})">Archive</button>
      <button class="btn btn-sm btn-danger" onclick="deletePost(${idx})">Delete</button>
    </div>`
  }).join('')
}

function cancelBlogEdit() {
  editingPostIdx = null
  document.getElementById('blog-title').value = ''
  document.getElementById('blog-subtitle').value = ''
  document.getElementById('blog-slug').value = ''
  document.getElementById('blog-slug').disabled = false
  quill.setContents([])
  document.getElementById('blog-submit-btn').textContent = 'Publish Post'
  document.getElementById('blog-cancel-btn').style.display = 'none'
}

async function editPost(idx) {
  const p = postsData[idx]
  setStatus('blog', 'Loading post...')
  try {
    const file = await ghGet(p.url)
    const raw = decodeURIComponent(escape(atob(file.content)))
    const doc = new DOMParser().parseFromString(raw, 'text/html')
    const titleEl    = doc.querySelector('.post-title')
    const subtitleEl = doc.querySelector('.post-subtitle')
    const bodyEl     = doc.querySelector('.post-body')
    document.getElementById('blog-title').value    = titleEl    ? titleEl.textContent.trim()    : p.title
    document.getElementById('blog-subtitle').value = subtitleEl ? subtitleEl.textContent.trim() : ''
    const slug = p.url.replace('posts/', '').replace('.html', '')
    document.getElementById('blog-slug').value    = slug
    document.getElementById('blog-slug').disabled = true
    quill.root.innerHTML = bodyEl ? bodyEl.innerHTML : ''
    editingPostIdx = idx
    document.getElementById('blog-submit-btn').textContent = 'Update Post'
    document.getElementById('blog-cancel-btn').style.display = 'inline-block'
    document.getElementById('blog-title').focus()
    setStatus('blog', 'Post loaded — edit and hit Update Post.')
  } catch(e) { setStatus('blog', 'Could not load post: ' + e.message, true) }
}

async function publishPost() {
  const title    = document.getElementById('blog-title').value.trim()
  const subtitle = document.getElementById('blog-subtitle').value.trim()
  const slug     = document.getElementById('blog-slug').value.trim().replace(/[^a-z0-9-]/gi, '-').toLowerCase()
  const html     = quill.root.innerHTML

  if (!title || !slug || html === '<p><br></p>' || !html) {
    setStatus('blog', 'Title, slug, and content are required.', true)
    return
  }

  const postPath = `posts/${slug}.html`

  if (editingPostIdx !== null) {
    // Update existing post
    const orig = postsData[editingPostIdx]
    const d = new Date(orig.date)
    const dateLabel = d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })
    const postHtml = generatePostHtml({ title, subtitle, dateLabel, html })
    try {
      setStatus('blog', 'Updating...')
      const existing = await ghGet(postPath)
      await ghPut(postPath, postHtml, `update post: ${title}`, existing.sha)
      postsData[editingPostIdx] = { ...orig, title }
      await writeJson('public/data/posts.json', postsData, `update post entry: ${title}`)
      setStatus('blog', 'Post updated!')
      cancelBlogEdit()
      renderBlogList()
    } catch(e) { setStatus('blog', e.message, true) }
    return
  }

  // New post
  const today = new Date().toISOString().slice(0, 10)
  const d = new Date()
  const dateLabel = d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })
  const postHtml = generatePostHtml({ title, subtitle, dateLabel, html })

  try {
    setStatus('blog', 'Publishing...')
    await ghPut(postPath, postHtml, `add post: ${title}`)
    postsData.push({ title, date: today, url: postPath })
    await writeJson('public/data/posts.json', postsData, `add post entry: ${title}`)
    document.getElementById('blog-title').value = ''
    document.getElementById('blog-subtitle').value = ''
    document.getElementById('blog-slug').value = ''
    quill.setContents([])
    setStatus('blog', 'Post published!')
    renderBlogList()
  } catch(e) { setStatus('blog', e.message, true) }
}

// ── Archive helper ────────────────────────────────────────────
async function archiveEntry(text, date) {
  const today = new Date().toISOString().slice(0, 10)
  let archiveData = []
  let sha
  try { const f = await readJson('public/data/archive.json'); archiveData = f.data; sha = f.sha } catch {}
  archiveData.push({ text, from: date || today, to: today })
  await writeJson('public/data/archive.json', archiveData, `archive: ${text.slice(0, 40)}`)
}

// ── YouTube ID extractor ──────────────────────────────────────
function extractYouTubeId(input) {
  input = input.trim()
  const match = input.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/)
  return match ? match[1] : input
}

// ── Utils ─────────────────────────────────────────────────────
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}
